name: Build and Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o loglens main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: loglens
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}wq
